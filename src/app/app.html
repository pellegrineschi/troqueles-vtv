<mat-sidenav-container class="admin-shell">
  <mat-sidenav class="admin-sidebar" mode="side" opened>
    <div class="brand">
      <mat-icon>precision_manufacturing</mat-icon>
      <span>Troqueles VTV</span>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/troqueles" routerLinkActive="active-link">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Troqueles</span>
      </a>

      <a mat-list-item routerLink="/usuarios" routerLinkActive="active-link">
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle>Usuarios</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="admin-toolbar">
      <span>Panel administrativo</span>
      <span class="toolbar-spacer"></span>
      <button mat-icon-button aria-label="Notificaciones">
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-icon-button aria-label="Cuenta">
        <mat-icon>account_circle</mat-icon>
      </button>
    </mat-toolbar>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
